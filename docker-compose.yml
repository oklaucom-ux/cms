version: '3.8'

services:
  cms:
    build: .
    ports:
      - "8000:80"
    environment:
      - DATABASE_URL=mysql://cmsuser:cmspassword@db:3306/cmsdb
    depends_on:
      - db

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_DATABASE: cmsdb
      MYSQL_USER: cmsuser
      MYSQL_PASSWORD: cmspassword
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
