version: '3.8'

services:
  cms:
    build: .
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      - DATABASE_URL=mysql://${MYSQL_USER:-root}:${MYSQL_PASSWORD:-${MYSQL_ROOT_PASSWORD}}@db:3306/${MYSQL_DATABASE}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${MYSQL_DATABASE}
      - DB_USERNAME=${MYSQL_USER:-root}
      - DB_PASSWORD=${MYSQL_PASSWORD:-${MYSQL_ROOT_PASSWORD}}
      - CRON_BACKUP_TOKEN=${CRON_BACKUP_TOKEN}
    depends_on:
      - db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthz.php"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
